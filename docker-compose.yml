services:
  support-ops-env:
    build:
      context: .
      dockerfile: Dockerfile
    image: support-ops-env:latest
    env_file:
      - .env
    ports:
      - "7860:7860"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "support_ops_env.server.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "7860",
      ]
